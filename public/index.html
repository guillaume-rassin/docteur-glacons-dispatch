<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dispatch Docteur Glaçons</title>

<style>

body{
font-family: Arial;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:30px;
}

.section{
border:2px solid #3b5b8a;
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

.section h2{
margin-top:0;
color:#3b5b8a;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.grid3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
width:100%;
box-sizing:border-box;
}

textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.calc{
background:#3b5b8a;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
border-radius:8px;
}

button{
background:#3b5b8a;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2f4870;
}

</style>
</head>

<body>

<div class="container">

<h1>Dispatch Docteur Glaçons</h1>

<form id="form">

<div class="section">
<h2>Client</h2>

<div class="grid3">

<div>
<label>Prénom</label>
<input id="firstName">
</div>

<div>
<label>Nom</label>
<input id="lastName">
</div>

<div>
<label>Téléphone</label>
<input id="phone">
</div>

<div>
<label>Email</label>
<input id="email">
</div>

<div>
<label>Société</label>
<input id="company">
</div>

<div>
<label>Typologie</label>
<select id="clientType">
<option></option>
<option>Particulier</option>
<option>Restaurant</option>
<option>Entreprise</option>
<option>Bar</option>
<option>Traiteur</option>
<option>Brasserie</option>
<option>Agence</option>
<option>Café</option>
<option>Bar évènementiel</option>
<option>Hôtel</option>
<option>Galerie d'art</option>
</select>
</div>

</div>
</div>


<div class="section">
<h2>Livraison</h2>

<div class="grid">

<div>
<label>Adresse</label>
<input id="address">
</div>

<div>
<label>Nom du lieu</label>
<input id="venueName">
</div>

<div>
<label>Date</label>
<input type="date" id="deliveryDate">
</div>

<div>
<label>Heure min</label>
<input type="time" id="timeMin">
</div>

<div>
<label>Heure max</label>
<input type="time" id="timeMax">
</div>

</div>

<br>

<label>Instructions</label>
<textarea id="instructions"></textarea>

</div>


<div class="section">
<h2>Produits</h2>

<div class="grid3">

<div>
<label>Glaçons (20kg)</label>
<input type="number" id="ice20" value="0">
</div>

<div>
<label>Pilée (20kg)</label>
<input type="number" id="crushed20" value="0">
</div>

<div>
<label>Carboglace 2kg</label>
<input type="number" id="dryIce2" value="0">
</div>

<div>
<label>Carboglace 5kg</label>
<input type="number" id="dryIce5" value="0">
</div>

<div>
<label>Carboglace 10kg</label>
<input type="number" id="dryIce10" value="0">
</div>

<div>
<label>Bac isotherme</label>
<input type="number" id="coolerBox" value="0">
</div>

<div>
<label>Frais livraison</label>
<select id="deliveryFee">
<option>0 €</option>
<option>10 €</option>
<option>15 €</option>
<option>20 €</option>
<option>30 €</option>
<option>40 €</option>
<option>50 €</option>
</select>
</div>

<div class="calc">
<span id="totalKg">0</span> kg
</div>

<div class="calc">
<span id="totalPrice">0</span> €
</div>

</div>
</div>


<div style="text-align:right">
<button type="submit">Créer la course</button>
</div>

</form>

</div>


<script>

function getNumber(id){
return Number(document.getElementById(id).value || 0)
}

function compute(){

let kg =
getNumber("ice20")*20 +
getNumber("crushed20")*20 +
getNumber("dryIce2")*2 +
getNumber("dryIce5")*5 +
getNumber("dryIce10")*10

let price =
getNumber("ice20")*20 +
getNumber("crushed20")*20 +
getNumber("dryIce2")*25 +
getNumber("dryIce5")*35 +
getNumber("dryIce10")*55 +
getNumber("coolerBox")*10

let delivery = document.getElementById("deliveryFee").value
delivery = Number(delivery.replace("€","").trim())

price += delivery

document.getElementById("totalKg").innerText = kg
document.getElementById("totalPrice").innerText = price

}

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("input",compute)
})

compute()

document.getElementById("form").addEventListener("submit",async e=>{

e.preventDefault()

let data = {
firstName:firstName.value,
lastName:lastName.value,
phone:phone.value,
address:address.value,
instructions:instructions.value
}

let r = await fetch("/api/create-onfleet-task",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(data)
})

let j = await r.json()

alert("Course créée")

})

</script>

</body>
</html>
