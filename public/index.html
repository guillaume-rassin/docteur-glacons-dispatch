<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dispatch Docteur Glaçons</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
margin:0;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 6px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:35px;
}

.section{
border:2px solid #445e88;
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

.section h2{
margin-top:0;
color:#445e88;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.grid3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
}

.grid4{
display:grid;
grid-template-columns:1fr 1fr 1fr 1fr;
gap:15px;
}

input,select,textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

textarea{
height:70px;
}

.calc{
background:#445e88;
color:white;
font-size:20px;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
font-weight:bold;
}

button{
background:#445e88;
color:white;
border:none;
padding:14px 22px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#31486e;
}

.footer{
display:flex;
justify-content:flex-end;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Création course Onfleet</h1>

<form id="form">

<div class="section">

<h2>Client</h2>

<div class="grid3">

<div>
<label>Prénom *</label>
<input id="firstName">
</div>

<div>
<label>Nom *</label>
<input id="lastName">
</div>

<div>
<label>Téléphone *</label>
<input id="phone">
</div>

<div>
<label>Email</label>
<input id="email">
</div>

<div>
<label>Société</label>
<input id="company">
</div>

<div>
<label>Typologie client *</label>
<select id="clientType">
<option></option>
<option>Particulier</option>
<option>Restaurant</option>
<option>Entreprise</option>
<option>Bar</option>
<option>Traiteur</option>
<option>Brasserie</option>
<option>Agence</option>
<option>Café</option>
<option>Bar évènementiel</option>
<option>Hôtel</option>
<option>Galerie d'art</option>
</select>
</div>

</div>

</div>



<div class="section">

<h2>Livraison</h2>

<div class="grid">

<div>
<label>Adresse *</label>
<input id="address">
</div>

<div>
<label>Nom du lieu</label>
<input id="venueName">
</div>

<div>
<label>Date *</label>
<input type="date" id="deliveryDate">
</div>

<div>
<label>Heure min *</label>
<input type="time" id="timeMin">
</div>

<div>
<label>Heure max *</label>
<input type="time" id="timeMax">
</div>

</div>

<br>

<label>Instructions</label>
<textarea id="instructions"></textarea>

</div>



<div class="section">

<h2>Produits</h2>

<div class="grid4">

<div>
<label>Glaçons (20kg)</label>
<input type="number" id="ice20" value="0">
</div>

<div>
<label>Pilée (20kg)</label>
<input type="number" id="crushed20" value="0">
</div>

<div>
<label>Carboglace 2kg</label>
<input type="number" id="dryIce2" value="0">
</div>

<div class="calc">
<span id="totalKg">0</span> kg
</div>

<div>
<label>Carboglace 5kg</label>
<input type="number" id="dryIce5" value="0">
</div>

<div>
<label>Carboglace 10kg</label>
<input type="number" id="dryIce10" value="0">
</div>

<div>
<label>Bac isotherme</label>
<input type="number" id="coolerBox" value="0">
</div>

<div>
<label>Frais livraison</label>
<select id="deliveryFee">
<option>0 €</option>
<option>10 €</option>
<option>15 €</option>
<option>20 €</option>
<option>30 €</option>
<option>40 €</option>
<option>50 €</option>
</select>
</div>

</div>

</div>



<div class="section">

<h2>Paiement</h2>

<div class="grid3">

<div>
<label>Mode de règlement *</label>
<select id="paymentMethod">
<option></option>
<option>CB</option>
<option>Espèces</option>
<option>Facture</option>
<option>Chèque</option>
</select>
</div>

<div class="calc">
<span id="totalPrice">0</span> €
</div>

</div>

</div>



<div class="footer">
<button type="submit">Créer la course</button>
</div>

</form>

</div>



<script>

function val(id){
return document.getElementById(id).value
}

function num(id){
return Number(document.getElementById(id).value || 0)
}

function compute(){

let kg =
num("ice20")*20 +
num("crushed20")*20 +
num("dryIce2")*2 +
num("dryIce5")*5 +
num("dryIce10")*10

let price =
num("ice20")*20 +
num("crushed20")*20 +
num("dryIce2")*25 +
num("dryIce5")*35 +
num("dryIce10")*55 +
num("coolerBox")*10

let delivery = Number(val("deliveryFee").replace("€",""))

price += delivery

document.getElementById("totalKg").innerText = kg
document.getElementById("totalPrice").innerText = price

}

document.querySelectorAll("input,select").forEach(e=>{
e.addEventListener("input",compute)
})

compute()



document.getElementById("form").addEventListener("submit",async e=>{

e.preventDefault()

let data = {

firstName:val("firstName"),
lastName:val("lastName"),
phone:val("phone"),

address:val("address"),
instructions:val("instructions")

}

let r = await fetch("/api/create-onfleet-task",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

let j = await r.json()

alert("Course créée dans Onfleet")

})

</script>

</body>
</html>
